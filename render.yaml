services:
  - type: web
    name: ngo-volunteer-management-system
    runtime: node
    plan: free
    buildCommand: npm ci --prefix backend && npm ci --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: LOG_LEVEL
        value: info
